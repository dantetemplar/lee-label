name: Release Build Trigger

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null
          gh api "repos/${{ github.repository }}/dispatches" \
            -f event_type='run-release-build' \
            -f "client_payload[tag]=$TAG"
          echo "Dispatched build for $TAG"
