name: Build

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: Build Linux (AppImage + deb)
        type: boolean
        default: true
      build_windows:
        description: Build Windows (NSIS)
        type: boolean
        default: true
      build_macos:
        description: Build macOS (dmg + zip, x64 + arm64)
        type: boolean
        default: true
  release:
    types: [published]
  repository_dispatch:
    types: [run-release-build]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      ref: ${{ steps.set-ref.outputs.ref }}
      release_tag: ${{ steps.set-ref.outputs.release_tag }}
    steps:
      - id: set-ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          BUILD_LINUX: ${{ inputs.build_linux }}
          BUILD_WINDOWS: ${{ inputs.build_windows }}
          BUILD_MACOS: ${{ inputs.build_macos }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ] || [ "$EVENT_NAME" = "repository_dispatch" ]; then
            {
              echo 'matrix<<EOF'
              echo '{"include":[{"platform":"linux","os":"ubuntu-latest","command":"--linux AppImage deb --publish never"},{"platform":"win","os":"windows-latest","command":"--win --publish never"},{"platform":"mac","os":"macos-latest","command":"--mac --x64 --arm64 --publish never"}]}'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          entries=()
          if [ "$BUILD_LINUX" = "true" ]; then
            entries+=('{"platform":"linux","os":"ubuntu-latest","command":"--linux AppImage deb --publish never"}')
          fi
          if [ "$BUILD_WINDOWS" = "true" ]; then
            entries+=('{"platform":"win","os":"windows-latest","command":"--win --publish never"}')
          fi
          if [ "$BUILD_MACOS" = "true" ]; then
            entries+=('{"platform":"mac","os":"macos-latest","command":"--mac --x64 --arm64 --publish never"}')
          fi

          if [ "${#entries[@]}" -eq 0 ]; then
            echo "At least one platform must be selected."
            exit 1
          fi

          matrix=$(printf '%s\n' "${entries[@]}" | jq -c -s '{include: .}')
          {
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and test
        run: pnpm run typecheck && pnpm test

      - name: Build app
        run: pnpm run build

      - name: Package
        run: pnpm exec electron-builder ${{ matrix.command }}

      - name: Stage artifacts
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          shopt -s nullglob
          mkdir -p artifacts

          if [ "$PLATFORM" = "linux" ]; then
            mkdir -p artifacts/appimage artifacts/deb
            cp dist/*.AppImage artifacts/appimage/
            cp dist/*.deb artifacts/deb/
          elif [ "$PLATFORM" = "mac" ]; then
            mkdir -p artifacts/dmg artifacts/x64 artifacts/arm64
            cp dist/*.dmg artifacts/dmg/
            for file in dist/*-arm64-mac.zip; do
              cp "$file" artifacts/arm64/
            done
            for file in dist/*-mac.zip; do
              [[ "$file" == *arm64* ]] && continue
              cp "$file" artifacts/x64/
            done
          elif [ "$PLATFORM" = "win" ]; then
            cp dist/*.exe artifacts/
          fi

          find artifacts -type f | sort

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lee-label-linux-appimage-${{ github.sha }}
          path: artifacts/appimage/
          if-no-files-found: error

      - name: Upload Linux deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lee-label-linux-deb-${{ github.sha }}
          path: artifacts/deb/
          if-no-files-found: error

      - name: Upload macOS dmg
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: lee-label-mac-dmg-${{ github.sha }}
          path: artifacts/dmg/
          if-no-files-found: error

      - name: Upload macOS Intel zip
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: lee-label-mac-x64-${{ github.sha }}
          path: artifacts/x64/
          if-no-files-found: error

      - name: Upload macOS Apple Silicon zip
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: lee-label-mac-arm64-${{ github.sha }}
          path: artifacts/arm64/
          if-no-files-found: error

      - name: Upload Windows installer
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lee-label-win-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error

  upload-release:
    needs: [prepare, build]
    if: github.event_name == 'release' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          body_path: RELEASE_NOTES.md
          files: |
            release-assets/**/*
